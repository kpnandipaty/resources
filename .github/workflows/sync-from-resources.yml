name: Sync from Resources Repo

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'

jobs:
  sync:
    runs-on: ibm-x86-64-small
    
    # checkouts the grabber directory (grabber/ibm ghe repo)
    steps:
      - name: Checkout grabber repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHE_PAT }}
          fetch-depth: 0
      
      #configures a git account to use for the sync
      - name: configure Git
        run: |
          git config user.name "github sync bot"
          git config user.email "syncbot@example.com"
      
      
      - name: add resources as remote
        run: |
          git remote add resources https://github.com/kpnandipaty/resources.git || true
          git fetch resources main
      
      # clones the resources repo into a temporary directory
      - name: Clone resources repo for comparison
        run: |
          git clone --depth 1 --branch main https://github.com/kpnandipaty/resources.git /tmp/resources


      - name: install rsync
        run: |
          sudo yum install -y rsync || sudo apt-get install -y rysnc 
      
      #
      - name: Check for differences using rsync
        id: check_diff
        run: |
          echo "Comparing files with rsync..."
          RSYNC_OUTPUT=$(rsync -naic --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            /tmp/resources/ ./ 2>&1)
          
          if [ -z "$RSYNC_OUTPUT" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "$RSYNC_OUTPUT"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "$RSYNC_OUTPUT" > /tmp/rsync_changes.txt
          fi
      
      - name: Create sync branch
        if: steps.check_diff.outputs.has_changes == 'true'
        run: |
          BRANCH_NAME="sync-${{ github.run_number }}"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          git checkout -b $BRANCH_NAME
      
      - name: Merge changes from resources
        if: steps.check_diff.outputs.has_changes == 'true'
        run: |
          git merge resources/main --no-edit -m "Sync changes from resources repo"
      
      - name: Push sync branch
        if: steps.check_diff.outputs.has_changes == 'true'
        run: |
          git push origin $BRANCH_NAME
      
      - name: Create Pull Request
        if: steps.check_diff.outputs.has_changes == 'true'
        env:
          GH_ENTERPRISE_TOKEN: ${{ secrets.GHE_PAT }}
          GH_HOST: github.ibm.com
          GITHUB_TOKEN: ${{ secrets.GHE_PAT }}
        run: |
          PR_BODY="This PR syncs changes from https://github.com/kpnandipaty/resources

          **Changes detected:** $(date)
          
          ## File Changes (detected by rsync)
          \`\`\`
          $(cat /tmp/rsync_changes.txt)
          \`\`\`
          
          Please review the changes before merging."
          
          gh pr create \
            --title "Sync changes from resources repo (sync-${{ github.run_number }})" \
            --body "$PR_BODY" \
            --base main \
            --head $BRANCH_NAME
