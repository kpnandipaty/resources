name: Sync from Resources Repo

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ibm-x86-64-small
    
    # checkouts the grabber directory (grabber/ibm ghe repo)
    steps:
      - name: checkout grabber repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHE_PAT }}
          fetch-depth: 0
      
      #configures a git account to use for the sync
      - name: configure Git
        run: |
          git config user.name "github sync bot"
          git config user.email "syncbot@example.com"
      
      # adding the resources repo as a remote and fetching the main branch
      - name: add resources as remote
        run: |
          git remote add resources https://github.com/kpnandipaty/resources.git || true
          git fetch resources main
      
      # checking for differences between the current branch and the resources repo main branch
      - name: check for differences
        id: check_diff
        run: |
          
          if git diff --quiet HEAD resources/main; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      # if there are changes create a new branch and checkout the branch
      - name: create sync branch
        if: steps.check_diff.outputs.has_changes == 'true'
        run: |
          BRANCH_NAME="sync-${{ github.run_number }}"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          git checkout -b $BRANCH_NAME
      

      #merges changes from the resources main into the branch that was created 
      - name: merge changes from resources
        if: steps.check_diff.outputs.has_changes == 'true'
        run: |
          git merge resources/main --allow-unrelated-histories --strategy-option=theirs --no-edit -m "sync changes from resources repo"
      
      #pushes the branch to the remote repo on github (otel-sync-test)
      - name: push sync branch
        if: steps.check_diff.outputs.has_changes == 'true'
        run: |
          git push origin $BRANCH_NAME
      
      #creates a pull request to merge the created branhc into main
      - name: create pull request
        if: steps.check_diff.outputs.has_changes == 'true'
        env:
          GH_ENTERPRISE_TOKEN: ${{ secrets.GHE_PAT }}
          GH_HOST: github.ibm.com
          GITHUB_TOKEN: ${{ secrets.GHE_PAT }}
        run: |
          gh pr create \
            --title "changes detected in the public repo. sync from resources repo" \
            --body "this is a PR" \
            --base main \
            --head $BRANCH_NAME
